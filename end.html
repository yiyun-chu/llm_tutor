<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Session — Complete</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Study Session</div>
    <div class="rid"></div>
  </header>

  <main class="stage">
    <section class="screen active">
      <div class="card narrow center">
        <div class="check">✓</div>
        <h1>All done</h1>
        <p class="prose">Your responses have been recorded. Thank you for taking part.</p>
        <p class="prose muted">Your participant ID was <span id="end-rid" class="mono"></span>.
           You may now close this tab.</p>
      </div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/content.js"></script>
  <script src="js/flow.js"></script>
  <script src="js/logger.js"></script>
  <script src="js/end.js"></script>
</body>
</html>
