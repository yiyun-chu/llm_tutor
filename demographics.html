<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Session — Demographic Survey</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <style>
    .card.narrow {
      max-width: 1050px;
      width: 92vw;
    }
    .stage {
        display: flex;
        justify-content: center;
        align-items: flex-start;
    }

    .screen {
        width: 100%;
        display: flex;
        justify-content: center;
    }

    .card.narrow {
        width: min(1050px, 92vw);
        margin: 0 auto;
    }

    #demographics-questions .question legend {
      font-size: 1.45rem;
      font-weight: 700;
      line-height: 1.35;
    }

    #demographics-questions .option {
      font-size: 1rem;
      line-height: 1.45;
    }

    #demographics-questions .question {
      padding: 2rem;
    }

    #demographics-questions .qnum {
      font-size: 1.1rem;
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="brand">Study Session</div>
    <div class="rid">ID&nbsp;<span id="rid-value" class="mono">…</span></div>
  </header>

  <main class="stage">
    <section class="screen active">
      <div class="card narrow">
        <p class="eyebrow">Part 1 of 3</p>
        <h1>Demographic Survey</h1>

        <p class="prose muted">
          Please answer the following survey questions.
        </p>

        <div id="demographics-questions" class="qlist"></div>

        <div class="actions">
          <button id="next" class="btn primary">Continue to pre-test →</button>
        </div>
      </div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/content.js"></script>
  <script src="js/flow.js"></script>
  <script src="js/logger.js"></script>
  <script src="js/survey.js"></script>
  <script src="js/demographics.js"></script>
</body>
</html>
