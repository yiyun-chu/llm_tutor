<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Session — Demographic Survey</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

<style>
  html,
  body {
    width: 100%;
    margin: 0;
    overflow-x: hidden;
  }

  /* Center the survey card */
  .stage {
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 2rem 0;
  }

  .screen,
  .screen.active {
    width: 100%;
    display: flex;
    justify-content: center;
  }

  .card.narrow {
    width: min(1050px, calc(100vw - 4rem));
    max-width: 1050px;
    margin: 0 auto;
  }

  /* ---------- Survey questions ---------- */

  #demographics-questions .question {
    padding: 1rem 2rem 1.5rem;
    margin-bottom: 1.5rem;
  }

  #demographics-questions .question legend {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 0.5rem;
    padding-bottom: 0;
  }

  #demographics-questions .qnum {
    font-size: 1.1rem;
  }

  #demographics-questions .option {
    font-size: 1rem;
    line-height: 1.4;
    margin: 0.35rem 0;
    padding: 0.9rem 1.2rem;
  }

  #demographics-questions .option:first-of-type {margin-top: 0.15rem;}

  #demographics-questions input[type="radio"] {
    transform: scale(1.1); margin-right: 0.8rem;
  }
</style>
</head>

<body>
  <header class="topbar">
    <div class="brand">Study Session</div>
    <div class="rid">ID&nbsp;<span id="rid-value" class="mono">…</span></div>
  </header>

  <main class="stage">
    <section class="screen active">
      <div class="card narrow">
        <p class="eyebrow">Part 1 of 3</p>
        <h1>Demographic Survey</h1>

        <p class="prose muted">
          Please answer the following survey questions.
        </p>

        <div id="demographics-questions" class="qlist"></div>

        <div class="actions">
          <button id="next" class="btn primary">Continue to pre-test →</button>
        </div>
      </div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/content.js"></script>
  <script src="js/flow.js"></script>
  <script src="js/logger.js"></script>
  <script src="js/survey.js"></script>
  <script src="js/demographics.js"></script>
</body>
</html>
