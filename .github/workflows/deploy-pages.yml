# Optional: deploys the frontend to GitHub Pages on every push to main.
# (You can also skip this file and just enable Pages -> "Deploy from a branch".)
name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          # Upload the repo root (index.html lives here). The /backend folder
          # is harmless static text on Pages; it is never executed there.
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
